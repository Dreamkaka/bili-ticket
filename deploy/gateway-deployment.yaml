apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-gateway
  namespace: ticket-monitor
  labels:
    app: ticket-gateway
spec:
  # 由于 SQLite 的文件锁和数据一致性限制，必须设置 replicas 为 1。
  replicas: 1
  strategy:
    type: Recreate # 确保在更新时，旧 Pod 释放 PVC 后新 Pod 再挂载，防止 Volume 挂载冲突
  selector:
    matchLabels:
      app: ticket-gateway
  template:
    metadata:
      labels:
        app: ticket-gateway
    spec:
      containers:
        - name: gateway
          image: <your-registry>/ticket-gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_PATH
              value: "/data/gateway.db"
            - name: CONFIG_PATH
              value: "/config/config.json"
          ports:
            - name: http
              containerPort: 3000
          # 存活和就绪探针，使用 Elysia.js 暴露的 API 进行健康检查
          livenessProbe:
            httpGet:
              path: /api/snapshot
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/snapshot
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            # 挂载 SQLite 数据库持久化存储
            - name: db-volume
              mountPath: /data
            # 挂载配置文件 ConfigMap
            - name: config-volume
              mountPath: /config
      volumes:
        - name: db-volume
          persistentVolumeClaim:
            claimName: gateway-db-pvc
        - name: config-volume
          configMap:
            name: gateway-config
            items:
              - key: config.json
                path: config.json
